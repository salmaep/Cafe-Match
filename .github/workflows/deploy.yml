name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate client/.env from secrets
        run: |
          cat > client/.env <<'EOF'
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_MAPS_MAP_ID=${{ secrets.VITE_GOOGLE_MAPS_MAP_ID }}
          VITE_GA_MEASUREMENT_ID=${{ secrets.VITE_GA_MEASUREMENT_ID }}
          VITE_ADSENSE_CLIENT=${{ secrets.VITE_ADSENSE_CLIENT }}
          VITE_ADSENSE_INFEED_SLOT=${{ secrets.VITE_ADSENSE_INFEED_SLOT }}
          EOF

      - name: Copy client/.env to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          source: client/.env
          target: /opt/Cafe-Match
          overwrite: true

      - name: Copy k8s manifests to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          source: "deploy/kube/cafe-match.yaml,deploy/kube/cafe-match-cert.yaml"
          target: /home/dios/kube-config
          strip_components: 2
          overwrite: true

      - name: Run deploy script on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/Cafe-Match

            # Load env (needed for mysqldump credentials)
            set -a
            . ./server/.env
            set +a

            echo "==> 1. Pull latest from main"
            git fetch origin main
            git reset --hard origin/main

            echo "==> 2. Backup database"
            BACKUP_DIR=/opt/Cafe-Match/backups
            mkdir -p "$BACKUP_DIR"
            STAMP=$(date +%Y%m%d-%H%M%S)
            docker compose exec -T mysql mysqldump \
              -u"$DB_USERNAME" -p"$DB_PASSWORD" "$DB_DATABASE" \
              | gzip > "$BACKUP_DIR/db-$STAMP.sql.gz"
            ls -tp "$BACKUP_DIR"/db-*.sql.gz | tail -n +11 | xargs -r rm

            echo "==> 3. Build client + app (no-cache so VITE_* env are baked fresh)"
            docker compose build --no-cache client app

            echo "==> 4. Recreate containers"
            docker compose up -d --force-recreate client app

            echo "==> 5. Wait for app to be ready"
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:3084/api/v1/health > /dev/null; then
                echo "App is ready"
                break
              fi
              echo "Waiting for app... ($i/30)"
              sleep 2
            done

            echo "==> 6. Run database migrations"
            docker compose exec -T app npm run migration:run:prod

            echo "==> 7. Smoke test"
            curl -fsS http://localhost:3083 > /dev/null
            echo "  client (3083) OK"
            curl -fsS http://localhost:3084/api/v1/health > /dev/null
            echo "  app (3084/api/v1/health) OK"

            echo "Deploy successful"
