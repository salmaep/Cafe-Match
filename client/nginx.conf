server {
    listen 3083;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Cache JS/CSS/fonts/images for 1 year (safe because Vite adds content hash to filenames)
    location ~* \.(?:js|css|woff2?|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all routes serve index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html is the entrypoint that references the content-hashed assets
    # cached immutably above. It must always be revalidated (no-cache) so a new
    # deploy takes effect immediately, instead of the browser serving a stale
    # index.html (→ stale asset refs) from its heuristic cache.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
