# cafe-match-cert.yaml — Ingress + TLS (cert-manager auto-issues Let's Encrypt cert).
# Apply AFTER cafe-match.yaml (Services + Endpoints must exist first).

# ──────────────────────────────────────────────────────────────────────────────
# WEB — https://geser.id → service cafe-match-web (port 3083)
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cafe-match-web-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - geser.id
      secretName: cafe-match-web-tls
  rules:
    - host: geser.id
      http:
        paths:
          # /sitemap.xml is generated dynamically by NestJS (SeoController) — proxied
          # to the API service so cafe URLs stay fresh without rebuilding the SPA.
          # Exact pathType beats the catch-all Prefix below.
          - path: /sitemap.xml
            pathType: Exact
            backend:
              service:
                name: cafe-match-api
                port:
                  number: 3084
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cafe-match-web
                port:
                  number: 3083

# ──────────────────────────────────────────────────────────────────────────────
# API — https://api.geser.id → service cafe-match-api (port 3084)
# ──────────────────────────────────────────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cafe-match-api-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.geser.id
      secretName: cafe-match-api-tls
  rules:
    - host: api.geser.id
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cafe-match-api
                port:
                  number: 3084
