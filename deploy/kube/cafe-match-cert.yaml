# cafe-match-cert.yaml — Ingress + TLS (cert-manager auto-issues Let's Encrypt cert).
# Apply AFTER cafe-match.yaml (Services + Endpoints must exist first).

# ──────────────────────────────────────────────────────────────────────────────
# WEB — https://salma.imola.ai → service cafe-match-web (port 3083)
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cafe-match-web-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - salma.imola.ai
      secretName: cafe-match-web-tls
  rules:
    - host: salma.imola.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cafe-match-web
                port:
                  number: 3083

# ──────────────────────────────────────────────────────────────────────────────
# API — https://api.salma.imola.ai → service cafe-match-api (port 3084)
# ──────────────────────────────────────────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cafe-match-api-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.salma.imola.ai
      secretName: cafe-match-api-tls
  rules:
    - host: api.salma.imola.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cafe-match-api
                port:
                  number: 3084
