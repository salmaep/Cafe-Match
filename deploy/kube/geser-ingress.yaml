# geser-ingress.yaml — Single Ingress dgn multi-host (1 TLS cert covers both).
# Pattern mirip patokin-tls-certs (1 cert untuk semua subdomain).
#
# Apply:
#   kubectl apply -f deploy/kube/geser-ingress.yaml
#
# Verify:
#   kubectl get certificate geser-tls
#   kubectl describe ingress geser-ingress

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: geser-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - geser.id
        - api.geser.id
      secretName: geser-tls
  rules:
    - host: geser.id
      http:
        paths:
          - path: /sitemap.xml
            pathType: Exact
            backend:
              service:
                name: geser-api
                port:
                  number: 5084
          - path: /
            pathType: Prefix
            backend:
              service:
                name: geser-web
                port:
                  number: 5083
    - host: api.geser.id
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: geser-api
                port:
                  number: 5084
