# geser-svc.yaml — K8s Service + Endpoints untuk Cafe-Match baru di server geser.
# Bridge ke port di mesin geser (192.168.88.196) yg jalanin docker compose.
#
# Apply:
#   kubectl apply -f deploy/kube/geser-svc.yaml

# ──────────────────────────────────────────────────────────────────────────────
# WEB — geser:5083 (container client / Vite preview)
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: geser-web
spec:
  ports:
    - protocol: TCP
      port: 5083
      targetPort: 5083
---
apiVersion: v1
kind: Endpoints
metadata:
  name: geser-web
subsets:
  - addresses:
      - ip: 192.168.88.196   # mesin geser internal IP
    ports:
      - port: 5083

# ──────────────────────────────────────────────────────────────────────────────
# API — geser:5084 (container app / NestJS)
# ──────────────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Service
metadata:
  name: geser-api
spec:
  ports:
    - protocol: TCP
      port: 5084
      targetPort: 5084
---
apiVersion: v1
kind: Endpoints
metadata:
  name: geser-api
subsets:
  - addresses:
      - ip: 192.168.88.196
    ports:
      - port: 5084
