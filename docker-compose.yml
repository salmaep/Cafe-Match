# Single source of truth for env: server/.env
# A symlink at the project root (.env -> server/.env) lets Compose auto-load it,
# so plain `docker compose up -d` works without --env-file.
# Set up once on each host: ln -s server/.env .env
#
# client/.env is read by Vite during the client image build (inside the container).

services:
  mysql:
    image: mysql:8.4
    container_name: cafematch-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cafematch_root}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cafematch-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  meilisearch:
    image: getmeili/meilisearch:v1.42
    container_name: cafematch-meili
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    networks:
      - cafematch-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./server
      dockerfile: Dockerfile
      # Bridge NAT chokes under the parallel-connection load of a full `npm ci`
      # (hangs ~141s on IPv6 attempts). Build on the host network stack, which
      # has working IPv4+IPv6. ipv4first ENV in Dockerfile guards runtime too.
      network: host
    container_name: cafematch-app
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - ./server/.env
    environment:
      # Override host-only values to use docker network hostnames
      DB_HOST: mysql
      MEILI_HOST: http://meilisearch:7700
      NODE_ENV: production
      PORT: "3084"
    ports:
      - "3084:3084"
    volumes:
      - app_storage:/app/storage
    networks:
      - cafematch-net
    depends_on:
      mysql:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  client:
    build:
      # Build context = repo root so the Dockerfile can `COPY shared/`
      # alongside `COPY client/`. Vite resolves `@shared` → `../shared` at
      # build time and bundles the files into static output (no runtime
      # dependency on layout).
      context: .
      dockerfile: client/Dockerfile
      network: host
      # Vite reads VITE_API_URL from client/.env during the build (inside container).
      # No build args needed here.
    container_name: cafematch-client
    restart: unless-stopped
    ports:
      - "3083:3083"
    networks:
      - cafematch-net
    depends_on:
      - app

networks:
  cafematch-net:
    driver: bridge

volumes:
  mysql_data:
  meili_data:
  app_storage: