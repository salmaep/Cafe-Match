# Single source of truth for env: server/.env
# Run with: docker compose --env-file server/.env up -d --build
# Compose file interpolates ${DB_PASSWORD}, ${MEILI_MASTER_KEY}, etc. from server/.env.
#
# client/.env is read by Vite during the client image build (inside the container).

services:
  mysql:
    image: mysql:8.4
    container_name: cafematch-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cafematch_root}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cafematch-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  meilisearch:
    image: getmeili/meilisearch:v1.42
    container_name: cafematch-meili
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    networks:
      - cafematch-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cafematch-app
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      # Override host-only values to use docker network hostnames
      DB_HOST: mysql
      MEILI_HOST: http://meilisearch:7700
      NODE_ENV: production
      PORT: "3084"
    ports:
      - "3084:3084"
    networks:
      - cafematch-net
    depends_on:
      mysql:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      # Vite reads VITE_API_URL from client/.env during the build (inside container).
      # No build args needed here.
    container_name: cafematch-client
    restart: unless-stopped
    ports:
      - "3083:3083"
    networks:
      - cafematch-net
    depends_on:
      - app

networks:
  cafematch-net:
    driver: bridge

volumes:
  mysql_data:
  meili_data: